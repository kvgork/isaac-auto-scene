name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.0
        with:
          pixi-version: latest
          cache: true

      - name: Lint
        run: pixi run lint

      - name: Type check
        run: pixi run typecheck || true  # non-blocking in Phase 1

      - name: Test
        run: pixi run test
