[workspace]
name = "isaac-auto-scene"
version = "0.1.0"
channels = ["conda-forge", "nvidia"]
platforms = ["linux-64"]

[dependencies]
python = "3.11.*"
pip = "*"

[pypi-dependencies]
isaac-auto-scene = { path = ".", editable = true }


[feature.dev.dependencies]
pytest = "*"
ruff = "*"
mypy = "*"
pre-commit = "*"
hatchling = "*"

[feature.geometry.pypi-dependencies]
open3d = "*"
numpy = "*"
scipy = "*"
trimesh = "*"
yourdfpy = "*"
pyransac3d = "*"

[feature.realsense.pypi-dependencies]
pyrealsense2 = "*"

# NOTE: lerobot is intentionally NOT declared as a pixi feature.
# Reason: lerobot 0.3.x depends on rerun-sdk which only publishes
# manylinux_2_31 wheels (no sdist).  pixi's PyPI resolver advertises
# the host as manylinux_2_28 on this build so `pixi install -e
# hardware` fails to satisfy the rerun-sdk constraint even though
# host glibc is 2.39 and the wheel installs fine.
#
# Install lerobot manually into the hardware env until pixi bumps its
# manylinux baseline OR lerobot publishes broader-tag wheels:
#
#     pixi run install-lerobot
#
# (The install-lerobot task below pip-installs into the active env,
#  bypassing the resolver.)


# Isaac Sim 5.1 cannot be installed via pixi's conda/pypi resolver because
# NVIDIA's custom PyPI index (https://pypi.nvidia.com) is not supported as a
# per-dependency index in pixi's current resolver.  Use `pixi run install-isaac`
# which invokes scripts/install_isaac.sh to pip-install into the active env.
[feature.isaac]
# TODO: add isaacsim + isaaclab here once pixi supports per-package PyPI indexes
# For now, install via: pixi run install-isaac

[environments]
default = ["dev", "geometry"]
sim = ["dev", "geometry", "isaac"]
hardware = ["dev", "geometry", "realsense"]
full = ["dev", "geometry", "isaac", "realsense"]

[tasks]
test = "pytest -q"
test-hw = "pytest -q --run-hardware"
lint = "ruff check src tests"
fmt = "ruff format src tests"
typecheck = "mypy src"
install-isaac = "bash scripts/install_isaac.sh"
install-lerobot = "pip install 'lerobot[feetech]>=0.3.2,<0.4'"
